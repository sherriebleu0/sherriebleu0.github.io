<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sherrie Bleu Site</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background-image:url("./fondo-estrellas.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
overflow-x:hidden;
}

/* Botón estrella */
.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:32px;
cursor:pointer;
z-index:1001;
background:rgba(0,0,0,0.4);
padding:10px 14px;
border-radius:50%;
}

/* Barra lateral */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100%;
background:rgba(20,20,40,0.92);
padding-top:80px;
transition:0.4s;
box-shadow:2px 0 15px rgba(0,0,0,0.6);
z-index:1000;
}

.sidebar.active{
left:0;
}

/* Logo */
.logo-box{
text-align:center;
margin-bottom:30px;
}

.logo-box img{
width:140px;
height:140px;
object-fit:contain;
border-radius:20px;
box-shadow:0 0 20px rgba(255,255,255,0.15);
}

/* Links menú */
.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:15px 25px;
margin:10px;
border-radius:10px;
transition:0.3s;
}

.sidebar a:hover{
background:#7b4cff;
}

/* Contenido principal */
.main{
text-align:center;
padding:100px 30px;
}

.main h1{
font-size:60px;
color:#e6c8ff;
}

.main p{
font-size:24px;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">✦</div>

<div class="sidebar" id="sidebar">

<div class="logo-box">
<img src="./Logo.png" alt="Logo Sherrie Bleu">
</div>

<a href="#">Sobre mí</a>
<a href="#">Historias</a>
<a href="#">Personajes</a>
<a href="#">Dibujos</a>
<a href="#">Blog</a>
<a href="#">Contacto</a>

</div>

<div class="main">
<h1>Sherrie Bleu Site</h1>
<p>Bienvenid@ a mi universo creativo ✨</p>
</div>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
