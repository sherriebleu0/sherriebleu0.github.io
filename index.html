<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sherrie Bleu Site</title>

<style>
body{
margin:0;
font-family:'Segoe UI', sans-serif;
background-image:url("./fondo-estrellas.png");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
overflow-x:hidden;
}

/* Botón menú */
.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
z-index:1001;
background:rgba(0,0,0,0.4);
padding:10px 14px;
border-radius:50%;
}

/* Sidebar */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100%;
background:rgba(20,20,40,0.95);
padding-top:80px;
transition:0.4s;
box-shadow:2px 0 15px rgba(0,0,0,0.6);
z-index:1000;
}

.sidebar.active{
left:0;
}

/* Logo */
.logo-box{
text-align:center;
margin-bottom:30px;
}

.logo-box img{
width:130px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,255,255,0.15);
}

/* Links menú */
.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:15px 25px;
margin:10px;
border-radius:10px;
transition:0.3s;
}

.sidebar a:hover{
background:#7b4cff;
}

/* MAIN */
.main{
text-align:center;
padding:100px 20px;
}

/* Título */
.title{
font-size:60px;
color:#d8b6ff;
margin-bottom:10px;
text-shadow:0 0 15px rgba(200,150,255,0.4);
}

/* Línea decorativa */
.divider{
width:250px;
height:2px;
background:linear-gradient(to right, transparent, #b57fff, transparent);
margin:20px auto;
}

/* Texto */
.welcome{
font-size:22px;
max-width:600px;
margin:0 auto;
line-height:1.6;
opacity:0.9;
}

/* Subtítulo */
.section-title{
margin-top:50px;
color:#cfa6ff;
font-size:28px;
}

/* GRID */
.grid{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:30px;
}

/* TARJETAS */
.card{
width:180px;
background:rgba(0,0,0,0.4);
border-radius:15px;
overflow:hidden;
transition:0.3s;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
cursor:pointer;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card p{
margin:10px;
font-weight:bold;
}

/* Hover */
.card:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 15px 25px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">✦</div>

<div class="sidebar" id="sidebar">

<div class="logo-box">
<img src="./Logo.png" alt="Logo Sherrie Bleu">
</div>

<a href="#">Sobre mí</a>
<a href="#">Historias</a>
<a href="#">Personajes</a>
<a href="#">Dibujos</a>
<a href="#">Blog</a>
<a href="#">Contacto</a>

</div>

<div class="main">

<h1 class="title">Sherrie Bleu Site</h1>

<div class="divider"></div>

<p class="welcome">
¡Bienvenid@!<br>
Este es mi espacio creativo donde comparto mis historias, personajes, dibujos y todo lo que me inspira ✨
</p>

<h2 class="section-title">✦ Explora mi universo ✦</h2>

<div class="grid">

<div class="card">
<img src="https://via.placeholder.com/300x200">
<p>Historias</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<p>Personajes</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<p>Dibujos</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<p>Blog</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<p>Contacto</p>
</div>

</div>

</div>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}
</script>

</body>
</html>
